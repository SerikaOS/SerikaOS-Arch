# ============================================================
# SerikaOS — Netinstall Package Groups
# The heart of user freedom — zero bloatware, everything opt-in
# ============================================================

# The user sees these as selectable categories in the installer.
# Nothing is pre-checked except the bare minimum base system.
# The user ticks exactly what they want.

- name: "Base System"
  description: "Essential system packages (required)"
  hidden: false
  selected: true
  critical: true
  immutable: true
  packages:
    - base
    - base-devel
    - linux-firmware
    - sudo
    - networkmanager
    - nano
    - mkinitcpio

- name: "Kernel"
  description: "Choose your Linux kernel"
  hidden: false
  selected: false
  critical: true
  subgroups:
    - name: "Linux (standard)"
      description: "The standard Linux kernel — stable and well-tested"
      selected: true
      critical: true
      packages:
        - linux
        - linux-headers
    - name: "Linux Zen"
      description: "Optimized for desktop responsiveness and gaming"
      selected: false
      packages:
        - linux-zen
        - linux-zen-headers
    - name: "Linux Hardened"
      description: "Security-focused kernel with hardening patches (recommended for privacy)"
      selected: false
      packages:
        - linux-hardened
        - linux-hardened-headers
    - name: "Linux LTS"
      description: "Long-term support kernel — maximum stability"
      selected: false
      packages:
        - linux-lts
        - linux-lts-headers

