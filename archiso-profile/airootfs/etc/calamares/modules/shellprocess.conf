# SerikaOS — Post-Install Shell Process
# Privacy & security hardening applied after installation
---
dontChroot: false
timeout: 300

script:
    # --- GRUB Theme Installation ---
    - command: "if command -v grub-install &>/dev/null && [ -d /usr/share/grub/themes/SerikaOS ]; then mkdir -p /boot/grub/themes && cp -r /usr/share/grub/themes/SerikaOS /boot/grub/themes/ && sed -i 's|^#\\?GRUB_THEME=.*|GRUB_THEME=\"/boot/grub/themes/SerikaOS/theme.txt\"|' /etc/default/grub && sed -i 's|^#\\?GRUB_GFXMODE=.*|GRUB_GFXMODE=\"auto\"|' /etc/default/grub && grub-mkconfig -o /boot/grub/grub.cfg; fi"
      timeout: 60

    # --- Enable Firewall (if installed) ---
    - command: "if command -v ufw &>/dev/null; then ufw default deny incoming && ufw default allow outgoing && ufw enable && systemctl enable ufw; fi"
      timeout: 15

    # --- Enable AppArmor (if installed) ---
    - command: "if [ -d /etc/apparmor.d ]; then systemctl enable apparmor; if grep -q GRUB_CMDLINE_LINUX_DEFAULT /etc/default/grub; then sed -i 's/GRUB_CMDLINE_LINUX_DEFAULT=\"\\(.*\\)\"/GRUB_CMDLINE_LINUX_DEFAULT=\"\\1 lsm=landlock,lockdown,yama,integrity,apparmor,bpf\"/' /etc/default/grub; fi; fi"
      timeout: 15

    # --- DNS-over-HTTPS via systemd-resolved ---
    - command: "mkdir -p /etc/systemd/resolved.conf.d && printf '[Resolve]\\nDNS=9.9.9.9#dns.quad9.net 149.112.112.112#dns.quad9.net 2620:fe::fe#dns.quad9.net\\nFallbackDNS=1.1.1.2#security.cloudflare-dns.com\\nDNSOverTLS=yes\\nDNSSEC=yes\\nDomains=~.\\n' > /etc/systemd/resolved.conf.d/serikaos-privacy.conf && systemctl enable systemd-resolved"
      timeout: 10

    # --- MAC Address Randomization ---
    - command: "mkdir -p /etc/NetworkManager/conf.d && printf '[device]\\nwifi.scan-rand-mac-address=yes\\n\\n[connection]\\nwifi.cloned-mac-address=random\\nethernet.cloned-mac-address=random\\nconnection.stable-id=${CONNECTION}/${BOOT}\\n' > /etc/NetworkManager/conf.d/30-mac-randomization.conf"
      timeout: 5

    # --- Kernel Hardening (sysctl) ---
    - command: "printf '# SerikaOS Privacy & Security Hardening\\nkernel.kptr_restrict=2\\nkernel.dmesg_restrict=1\\nkernel.randomize_va_space=2\\nkernel.yama.ptrace_scope=2\\nnet.ipv4.tcp_syncookies=1\\nnet.ipv4.conf.all.accept_redirects=0\\nnet.ipv4.conf.default.accept_redirects=0\\nnet.ipv6.conf.all.accept_redirects=0\\nnet.ipv6.conf.default.accept_redirects=0\\nnet.ipv4.conf.all.send_redirects=0\\nnet.ipv4.conf.default.send_redirects=0\\nnet.ipv4.conf.all.accept_source_route=0\\nnet.ipv4.conf.default.accept_source_route=0\\nnet.ipv6.conf.all.accept_source_route=0\\nnet.ipv6.conf.default.accept_source_route=0\\nnet.ipv4.conf.all.log_martians=1\\nnet.ipv6.conf.all.accept_ra=0\\nnet.ipv6.conf.default.accept_ra=0\\nfs.protected_hardlinks=1\\nfs.protected_symlinks=1\\nfs.protected_fifos=2\\nfs.protected_regular=2\\nkernel.unprivileged_userns_clone=0\\nkernel.unprivileged_bpf_disabled=1\\nnet.core.bpf_jit_harden=2\\n' > /etc/sysctl.d/99-serikaos-hardening.conf"
      timeout: 5

    # --- Telemetry Blocking (hosts file) ---
    - command: "printf '\\n# SerikaOS Telemetry Blocklist\\n0.0.0.0 telemetry.mozilla.org\\n0.0.0.0 incoming.telemetry.mozilla.org\\n0.0.0.0 data.microsoft.com\\n0.0.0.0 vortex.data.microsoft.com\\n0.0.0.0 settings-win.data.microsoft.com\\n0.0.0.0 dc.services.visualstudio.com\\n0.0.0.0 telemetry.google.com\\n0.0.0.0 update.googleapis.com\\n0.0.0.0 connectivitycheck.gstatic.com\\n0.0.0.0 crash-reports.mozilla.com\\n0.0.0.0 socorro.mozilla.org\\n' >> /etc/hosts"
      timeout: 5

    # --- SerikaOS Branding ---
    - command: "printf 'NAME=\"SerikaOS\"\\nPRETTY_NAME=\"SerikaOS\"\\nID=serikaos\\nID_LIKE=arch\\nBUILD_ID=rolling\\nANSI_COLOR=\"38;2;232;160;191\"\\nHOME_URL=\"https://serikaos.com\"\\nLOGO=serikaos\\n' > /etc/os-release"
      timeout: 5

    - command: "printf 'DISTRIB_ID=SerikaOS\\nDISTRIB_RELEASE=rolling\\nDISTRIB_DESCRIPTION=\"SerikaOS\"\\n' > /etc/lsb-release"
      timeout: 5

    # --- Enable Essential Services ---
    - command: "systemctl enable NetworkManager; systemctl enable fstrim.timer 2>/dev/null; true"
      timeout: 10

    # --- Enable Display Manager (whichever is installed) ---
    - command: "if command -v sddm &>/dev/null; then systemctl enable sddm; elif command -v gdm &>/dev/null; then systemctl enable gdm; elif command -v lightdm &>/dev/null; then systemctl enable lightdm; elif command -v ly &>/dev/null; then systemctl enable ly; fi"
      timeout: 10

    # --- Setup SDDM Theme (if installed) ---
    - command: "if command -v sddm &>/dev/null && [ -d /usr/share/sddm/themes/SerikaOS ]; then mkdir -p /etc/sddm.conf.d && printf '[Theme]\\nCurrent=SerikaOS\\n' > /etc/sddm.conf.d/serikaos.conf; fi"
      timeout: 5

    # --- Copy Wallpapers to user skel ---
    - command: "if [ -d /usr/share/wallpapers/SerikaOS ]; then mkdir -p /etc/skel/.local/share/wallpapers && cp -r /usr/share/wallpapers/SerikaOS /etc/skel/.local/share/wallpapers/; fi"
      timeout: 10

    # --- Remove live-session artifacts ---
    - command: "rm -f /etc/skel/Desktop/install-serikaos.desktop; rm -f /etc/skel/.config/autostart/serikaos-welcome.desktop; rm -f /usr/local/bin/serikaos-welcome; rm -f /usr/local/bin/serikaos-installer; rm -f /etc/systemd/system/calamares-autostart.service; true"
      timeout: 5
