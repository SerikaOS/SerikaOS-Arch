# SerikaOS — fstab Module
---
mountOptions:
    default: defaults,noatime
    btrfs: defaults,noatime,compress=zstd:3,space_cache=v2
    ext4: defaults,noatime
    xfs: defaults,noatime
    f2fs: defaults,noatime

ssdExtraMountOptions:
    btrfs: discard=async,ssd
    ext4: discard
    xfs: discard
    f2fs: discard

crypttabOptions: luks
